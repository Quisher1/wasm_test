name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# 1. Добавляем права, чтобы GitHub Actions мог управлять деплоем Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Разрешаем только один активный деплой одновременно
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    # Добавляем окружение для отслеживания деплоя в интерфейсе GitHub
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checks-out your repository
        uses: actions/checkout@v4

      # Здесь вы можете оставить свои тесты или другие скрипты, если нужно:
      - name: Run a one-line script
        run: echo "Starting deployment from public folder..."

      # 2. Шаг настройки Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 3. Архивируем и загружаем именно папку 'public'
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      # 4. Публикуем сайт на серверах GitHub
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
